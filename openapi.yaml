              properties:
                appointmentId:
                  type: string
                  description: Appointment ObjectId to confirm after QR verification and checklist
                    completion
                donationId:
                  type: string
                  description: Legacy Donation ObjectId to complete
                hemoglobinLevel:
                  type: number
                  description: Measured hemoglobin value in g/dL
                weight:
                  type: number
                  description: Donor weight in kg at the donation site
                unitsCollected:
                  type: integer
                  enum: [ 1, 2 ]
                  description: Number of units collected during the donation
                notes:
                  type: string
