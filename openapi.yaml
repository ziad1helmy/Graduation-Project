  /donations/complete:
    post:
      tags:
        - Hospital
      summary: Confirm a verified donation and award points
      description: |-
        Confirms a verified appointment after medical validation and triggers point award based on donation type.
        The controller reuses an existing `pending` or `scheduled` donation when one exists for the appointment/request pair, otherwise it creates the donation inside the transaction and then completes it.
        Legacy `donationId` completion is still supported for older callers.


        Demo seed available via `npm run seed-demo`. Base URL example: https://graduation-project-cy61.onrender.com This operation includes a seeded demo request example.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - required:
                    - appointmentId
                  properties:
                    appointmentId:
                      type: string
                      description: Appointment ObjectId to confirm after QR verification and checklist completion
                    hemoglobinLevel:
                      type: number
                      description: Measured hemoglobin value in g/dL
                    weight:
                      type: number
                      description: Donor weight in kg at the donation site
                    unitsCollected:
                      type: integer
                      enum: [ 1, 2 ]
                      description: Number of units collected during the donation
                    notes:
                      type: string
                - required:
                    - donationId
                  properties:
                    donationId:
                      type: string
                      description: Legacy Donation ObjectId to complete
                    completedDate:
                      type: string
                      format: date-time
                      description: Optional completion timestamp for the legacy path
                    notes:
                      type: string
            example:
              appointmentId: 69fe540565ff7785a031315c
              hemoglobinLevel: 14.8
              weight: 72
              unitsCollected: 1
              notes: Donation completed successfully.
      responses:
        "200":
          description: Donation completed and points awarded
          content:
            application/json:
              example:
                success: true
                message: Donation completed successfully
                data:
                  donation:
                    _id: 69fe540565ff7785a0313157
                    donorId: 69f3df915f42685cbbbcbb18
                    appointmentId: 69fe540565ff7785a031315c
                    requestId: 69fe540565ff7785a0313151
                    quantity: 1
                    unitsCollected: 1
                    hemoglobinLevel: 14.8
                    weight: 72
                    status: completed
                    completedDate: 2026-05-11T10:00:00.000Z
                  appointment:
                    id: 69fe540565ff7785a031315c
                    status: completed
                    verificationStatus: completed
                    donationType: Whole Blood
                  pointsEarned: 100
        "400":
          description: Invalid donation completion payload or validation failure
        "404":
          description: Donation, appointment, or donor not found
        "409":
          description: Donation has already been confirmed for this appointment
  /appointments/verify-qr:
    post:
      tags:
        - Hospital
      summary: Scan donor QR code at hospital check-in
      description: |-
        Hospital staff scans the donor's QR code to start the verification flow.
        - Validates the QR token, checks expiry and one-time usage
        - Confirms donor eligibility and appointment activity
        - Returns the donor profile, appointment details, and a `verificationSessionId`
        - Sets verification to `pending` — use `POST /appointments/:id/verify` to confirm

        **Scan-only.** Checklist and disease screening are submitted via the confirm endpoint.

        **Role required:** hospital | admin | superadmin


        Demo seed available via `npm run seed-demo`. Base URL example: https://graduation-project-cy61.onrender.com This operation includes a seeded demo request example.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - qrToken
              properties:
                qrToken:
                  type: string
                  description: The secure QR token scanned from the donor's device
                  example: a3f9c1e82b4d...
            example:
              qrToken: demo-qr-noor-verify
      responses:
        "200":
          description: QR scanned, verification session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Donation verification started successfully
                  data:
                    type: object
                    properties:
                      verificationStatus:
                        type: string
                        example: pending
                      verificationSessionId:
                        type: string
                        example: 2a9d4f6f5f4e4f2e8e2f5a2d1e0c9b8a
                      appointment:
                        type: object
                        properties:
                          id:
                            type: string
                          appointmentDate:
                            type: string
                            format: date-time
                          status:
                            type: string
                          donationType:
                            type: string
                          qrToken:
                            type: string
                          qrScannedAt:
                            type: string
                            format: date-time
                          qrExpiresAt:
                            type: string
                            format: date-time
                          requestId:
                            type: string
                          hospital:
                            type: object
                            properties:
                              id:
                                type: string
                              fullName:
                                type: string
                              hospitalName:
                                type: string
                              contactNumber:
                                type: string
                      donor:
                        type: object
                        properties:
                          id:
                            type: string
                          fullName:
                            type: string
                          initials:
                            type: string
                          bloodType:
                            type: string
                          phoneNumber:
                            type: string
                          email:
                            type: string
                          location:
                            type: object
                            properties:
                              lat:
                                type: number
                              lng:
                                type: number
                          lastDonationDate:
                            type: string
                            format: date-time
                            nullable: true
                          hemoglobinLevel:
                            type: number
                            nullable: true
                          weight:
                            type: number
                            nullable: true
                          participation:
                            type: boolean
                      eligibility:
                        type: object
                        properties:
                          eligible:
                            type: boolean
                          reason:
                            type: string
                            nullable: true
                          nextEligibleDate:
                            type: string
                            format: date-time
                            nullable: true
        "400":
          description: |
            One of:
            - qrToken is required
            - QR code expired
            - Appointment is cancelled
            - Appointment is not active
        "401":
          description: Missing or invalid JWT token
        "403":
          description: Donor is not eligible to donate
        "404":
          description: Invalid QR code (token not found)
        "409":
          description: QR code already used

  /appointments/{appointmentId}/verify:
    post:
      tags:
        - Hospital
      summary: Confirm donor arrival after checklist and disease screening
      description: |-
        Hospital staff submits the completed checklist and disease screening results
        after physically verifying the donor.

        - Requires `verificationSessionId` from the scan step
        - All three checklist items must be `true`
        - Disease screening must be completed
        - If a disqualifying disease is found, the donor is deferred and verification rejected
        - If all checks pass, verification is marked as `verified`

        **Role required:** hospital | admin | superadmin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
          example: 69fe540565ff7785a031315c
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - verificationSessionId
                - checklist
                - diseaseScreening
              properties:
                verificationSessionId:
                  type: string
                  description: Session ID returned from verify-qr scan
                  example: 2a9d4f6f5f4e4f2e8e2f5a2d1e0c9b8a
                checklist:
                  type: object
                  description: Pre-donation checklist completed by hospital staff
                  required:
                    - idVerified
                    - questionnaireCompleted
                    - consentSigned
                  properties:
                    idVerified:
                      type: boolean
                      example: true
                    questionnaireCompleted:
                      type: boolean
                      example: true
                    consentSigned:
                      type: boolean
                      example: true
                diseaseScreening:
                  type: object
                  description: Disease screening results
                  required:
                    - screeningCompleted
                    - disqualifyingDiseaseFound
                  properties:
                    screeningCompleted:
                      type: boolean
                      description: Whether the disease screening was performed
                      example: true
                    disqualifyingDiseaseFound:
                      type: boolean
                      description: Whether any disqualifying disease was found
                      example: false
                    disqualifyingDiseases:
                      type: array
                      description: List of disqualifying disease codes found (required if disqualifyingDiseaseFound is true)
                      items:
                        type: string
                      example: []
                    notes:
                      type: string
                      description: Optional notes from the hospital
                      maxlength: 1000
                      example: ""
            examples:
              confirmed:
                summary: All checks pass
                value:
                  verificationSessionId: 2a9d4f6f5f4e4f2e8e2f5a2d1e0c9b8a
                  checklist:
                    idVerified: true
                    questionnaireCompleted: true
                    consentSigned: true
                  diseaseScreening:
                    screeningCompleted: true
                    disqualifyingDiseaseFound: false
                    disqualifyingDiseases: []
                    notes: ""
              deferred:
                summary: Disqualifying disease found
                value:
                  verificationSessionId: 2a9d4f6f5f4e4f2e8e2f5a2d1e0c9b8a
                  checklist:
                    idVerified: true
                    questionnaireCompleted: true
                    consentSigned: true
                  diseaseScreening:
                    screeningCompleted: true
                    disqualifyingDiseaseFound: true
                    disqualifyingDiseases:
                      - HIV_AIDS
                    notes: Donor tested positive for HIV
      responses:
        "200":
          description: Verification confirmed or donor deferred
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      verificationStatus:
                        type: string
                        enum: [verified, rejected]
                      appointmentId:
                        type: string
                      verificationRejectedReason:
                        type: string
                      donorDeferred:
                        type: boolean
                      appointment:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
                          verificationStatus:
                            type: string
                          donationType:
                            type: string
                      donor:
                        type: object
                        properties:
                          id:
                            type: string
                          fullName:
                            type: string
                          initials:
                            type: string
                          bloodType:
                            type: string
                      diseaseScreening:
                        type: object
                        properties:
                          screeningCompleted:
                            type: boolean
                          disqualifyingDiseaseFound:
                            type: boolean
              examples:
                confirmed:
                  summary: All checks pass
                  value:
                    success: true
                    message: Arrival confirmed successfully
                    data:
                      verificationStatus: verified
                      appointmentId: 69fe540565ff7785a031315c
                      appointment:
                        id: 69fe540565ff7785a031315c
                        status: confirmed
                        verificationStatus: verified
                        donationType: "Whole Blood"
                      donor:
                        id: 69f3df915f42685cbbbcbb1c
                        fullName: "Noor El-Din"
                        initials: "NE"
                        bloodType: "O-"
                      diseaseScreening:
                        screeningCompleted: true
                        disqualifyingDiseaseFound: false
                deferred:
                  summary: Disqualifying disease found
                  value:
                    success: true
                    message: "Donor deferred due to disqualifying disease"
                    data:
                      verificationStatus: rejected
                      verificationRejectedReason: "Disqualifying disease found: HIV_AIDS"
                      donorDeferred: true
                      appointmentId: 69fe540565ff7785a031315c
        "400":
          description: |
            One of:
            - Invalid appointment ID
            - verificationSessionId is required
            - All checklist items must be completed
            - Disease screening must be completed
            - Invalid verification session
            - Appointment cannot be verified
        "401":
          description: Missing or invalid JWT token
        "403":
          description: Role not allowed
        "404":
          description: Appointment not found
        "409":
          description: Verification is already completed or rejected

  /appointments/{appointmentId}/reject:
    post:
      tags:
        - Hospital
      summary: Reject the current verification flow
      description: |-
        Safely rejects a verification session so the hospital can stop the flow without confirming the donation.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
          example: 69fe540565ff7785a031315c
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
            example:
              reason: Patient not ready
      responses:
        "200":
          description: Verification rejected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Verification rejected successfully"
                  data:
                    type: object
                    properties:
                      appointmentId:
                        type: string
                      verificationStatus:
                        type: string
                        example: rejected
                      rejectedAt:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      requestStatus:
                        type: string
                      donationStatus:
                        type: string
        "401":
          description: Missing or invalid JWT token
        "403":
          description: Role not allowed
        "404":
          description: Appointment not found
  /appointments/{appointmentId}/rescan:
    post:
      tags:
        - Hospital
      summary: Reset the current verification session
      description: |-
        Clears the current verification state so the hospital can scan another donor or restart the flow safely.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
          example: 69fe540565ff7785a031315c
      responses:
        "200":
          description: Verification reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Verification reset successfully"
                  data:
                    type: object
                    properties:
                      appointmentId:
                        type: string
                      verificationStatus:
                        type: string
                        example: pending
        "401":
          description: Missing or invalid JWT token
        "403":
          description: Role not allowed
        "404":
          description: Appointment not found
  /requests/{id}/confirm:
    post:
      tags:
        - Hospital
      summary: Hospital confirms donor arrival (Hospital Request flow)
      security:
        - bearerAuth: []
      description: |-
        Hospital confirms a donor's arrival after scanning the QR code. Re-runs eligibility
        checks (excluding the current donation). If the donor is still eligible, the donation
        and request are atomically completed, the donor's `lastDonationDate` is updated, and
        rewards are processed. If the donor is no longer eligible, the donation is rejected,
        the request reverts to `pending`, and compatible donors are re-notified.

        Only hospital, admin, or superadmin roles can confirm. The request must be in
        `accepted` or `in-progress` status. The arrival deadline and QR expiry must not have passed.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Request identifier
          example: 69fe540565ff7785a031314f
      responses:
        "200":
          description: Donation confirmed and completed successfully
          content:
            application/json:
              example:
                success: true
                message: Donation confirmed and completed successfully
                data:
                  requestId: 69fe540565ff7785a031314f
                  donationId: 69fe540565ff7785a031314a
                  status: completed
        "400":
