  /hospital/find-donors:
    get:
      tags:
        - Hospital
      summary: Find nearby compatible donors for the hospital donor search screen
      description: |-
        Returns real compatible donors for the Hospital "Find Donors" UI using the shared matching infrastructure in `src/services/matching.service.js`.
        Search coordinates come from `lat` and `lng` when supplied. Otherwise, hospital users fall back to their saved hospital coordinates. Admin and superadmin users must provide `lat` and `lng` explicitly.
        Results are filtered by radius, optional blood type compatibility, optional availability, sorted by nearest distance first, and paginated.


        Demo seed available via `npm run seed-demo`. Base URL example: https://graduation-project-cy61.onrender.com Parameter examples are aligned with the seeded demo dataset where possible.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: bloodType
          required: false
          schema:
            type: string
            enum:
              - A+
              - A-
              - B+
              - B-
              - AB+
              - AB-
              - O+
              - O-
          description: Recipient blood type to match against compatible donor blood types
          example: O+
        - in: query
          name: radiusKm
          required: false
          schema:
            type: number
            default: 5
            minimum: 0.1
          description: Search radius in kilometers
          example: 5
        - in: query
          name: lat
          required: false
          schema:
            type: number
            minimum: -90
            maximum: 90
          description: Search latitude. If omitted, hospital users fall back to saved
            hospital coordinates. Alias for latitude.
          example: 30.0444
        - in: query
          name: lng
          required: false
          schema:
            type: number
            minimum: -180
            maximum: 180
          description: Search longitude. If omitted, hospital users fall back to saved
            hospital coordinates. Preferred alias for longitude.
          example: 31.2357
        - in: query
          name: long
          required: false
          schema:
            type: number
            minimum: -180
            maximum: 180
          description: Search longitude. Alias for lng/longitude.
          example: 31.2357
        - in: query
          name: latitude
          required: false
          schema:
            type: number
            minimum: -90
            maximum: 90
          description: Search latitude. Alias for lat.
          example: 30.0444
        - in: query
          name: longitude
          required: false
          schema:
            type: number
            minimum: -180
            maximum: 180
          description: Search longitude. Alias for lng.
          example: 31.2357
        - in: query
          name: availability
          required: false
          schema:
            type: boolean
            default: true
          description: When true, only currently available donors are returned. When
            false, only unavailable donors are returned.
          example: true
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
          example: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Page size
          example: 20
        - in: query
          name: groupBy
          required: false
          schema:
            type: string
            enum:
              - bloodType
          description: Optional grouping logic. If set to bloodType, returns donors grouped by blood type.
          example: bloodType
      responses:
        "200":
          description: Nearby donors retrieved successfully
          content:
            application/json:
              examples:
                flatList:
                  summary: Flat list of compatible donors sorted by proximity
                  value:
                    success: true
                    message: Nearby donors retrieved successfully
                    data:
                      donors:
                        - id: 69f3df915f42685cbbbcbb18
                          donorId: 69f3df915f42685cbbbcbb18
                          name: Sarah J.
                          fullName: Sarah J.
                          bloodType: O+
                          email: sarah.j@example.com
                          phoneNumber: "01012345678"
                          distance: 2.30 km
                          distanceInKm: 2.3
                          distanceKm: 2.3
                          distanceMeters: 2300
                          isOptedIn: true
                          latitude: 30.0444
                          longitude: 31.2357
                          location:
                            lat: 30.0444
                            lng: 31.2357
                        - id: 69f3df915f42685cbbbcbb19
                          donorId: 69f3df915f42685cbbbcbb19
                          name: Omar F.
                          fullName: Omar F.
                          bloodType: O-
                          email: omar.f@example.com
                          phoneNumber: "01098765432"
                          distance: 4.10 km
                          distanceInKm: 4.1
                          distanceKm: 4.1
                          distanceMeters: 4100
                          isOptedIn: true
                          latitude: 30.061
                          longitude: 31.229
                          location:
                            lat: 30.061
                            lng: 31.229
                      pagination:
                        page: 1
                        limit: 20
                        total: 2
                        totalPages: 1
                groupedList:
                  summary: Nearby donors grouped by blood type
                  value:
                    success: true
                    message: Nearby donor groups retrieved successfully
                    data:
                      groups:
                        - bloodType: O+
                          count: 5
                          nearestDistanceKm: 2.3
                        - bloodType: A-
                          count: 2
                          nearestDistanceKm: 4.5
        "400":
          description: Invalid query parameters or missing coordinates
