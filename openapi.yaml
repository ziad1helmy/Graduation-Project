      summary: Create a hospital donation request
      description: |-
        Creates a blood, plasma, platelets, or double red cells donation request for the authenticated hospital.
        The server derives the hospital identity and location from the authenticated user.
        Emergency requests may set `isEmergency: true` and omit `urgency`; the controller will persist them as critical blood requests.
