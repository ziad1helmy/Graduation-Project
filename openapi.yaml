  /help/faq:
    get:
      summary: Get FAQ list
      tags:
        - Help
      responses:
        "200":
          description: FAQ retrieved successfully
  /help/documents/{type}:
    get:
      summary: Get help document by type
      tags:
        - Help
      description: Returns a stored help document, or 404 if that document has not
        been configured.
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document retrieved successfully
  /hospital/profile:
    get:
      tags:
        - Hospital
      summary: Get the authenticated hospital profile
      description: Retrieve the authenticated hospital's profile information including
        license, contact details, blood inventory, and location coordinates
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Hospital profile retrieved successfully
          content:
            application/json:
              example:
                success: true
                message: Hospital profile retrieved successfully
                data:
                  _id: 66f100000000000000000001
                  fullName: Cairo General Hospital
                  hospitalName: Cairo General Hospital
                  email: info@cairohospital.com
                  role: hospital
                  licenseNumber: LIC-2026-001
                  contactNumber: "01099998888"
                  lat: 30.0444
                  long: 31.2357
        "401":
          description: Missing or invalid JWT token
        "403":
          description: Access denied - hospital role required
        "404":
          description: Hospital profile not found
    put:
      tags:
        - Hospital
      summary: Update the authenticated hospital profile
      description: Update hospital information including name, contact number,
        address, location coordinates (lat/long), and license number
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  description: Hospital full name
                  example: Cairo General Hospital
                hospitalName:
                  type: string
                  description: Hospital display name
                  example: Cairo General Hospital
                contactNumber:
                  type: string
                  description: Hospital contact phone number
                  example: "01099998888"
                address:
                  type: object
                  description: Hospital address information
                  properties:
                    city:
                      type: string
                      example: Cairo
                    governorate:
                      type: string
                      example: Cairo
                lat:
                  type: number
                  description: Hospital latitude coordinate (-90 to 90)
                  example: 30.0444
                long:
                  type: number
                  description: Hospital longitude coordinate (-180 to 180)
                  example: 31.2357
                licenseNumber:
                  type: string
                  description: Hospital license number
                  example: LIC-2026-001
      responses:
        "200":
          description: Hospital profile updated successfully
          content:
            application/json:
              example:
                success: true
                message: Hospital profile updated successfully
                data:
                  _id: 66f100000000000000000001
                  fullName: Cairo General Hospital
                  role: hospital
        "400":
          description: Invalid profile data or validation error
        "401":
          description: Missing or invalid JWT token
        "403":
          description: Access denied - hospital role required
  /hospital/request:
    post:
      tags:
        - Hospital
      summary: Create a new donation request
      description: Create a blood or organ donation request with type, urgency,
        required blood types, and deadline
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - urgency
                - requiredBy
              properties:
                type:
                  type: string
                  enum:
                    - blood
                    - organ
                  example: blood
                bloodType:
                  type: string
                  enum:
                    - A+
                    - A-
                    - B+
                    - B-
                    - AB+
                    - AB-
                    - O+
                    - O-
                  example: O+
                organType:
                  type: string
                  enum:
                    - kidney
                    - liver
                    - heart
                    - lung
                    - pancreas
                    - cornea
                  example: kidney
                urgency:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                    - critical
                  example: high
                requiredBy:
                  type: string
                  format: date-time
                  example: 2026-04-15T00:00:00.000Z
                quantity:
                  type: number
                  example: 2
                notes:
                  type: string
                  example: Need compatible donors urgently
      responses:
        "201":
          description: Donation request created successfully
        "400":
          description: Invalid request payload
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role not allowed
  /hospital/requests:
    get:
      tags:
        - Hospital
      summary: List requests created by the authenticated hospital
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - pending
              - in-progress
              - completed
              - cancelled
        - in: query
          name: type
          schema:
            type: string
            enum:
              - blood
              - organ
        - in: query
          name: skip
          schema:
            type: integer
            example: 0
          description: Legacy pagination alias still supported.
        - in: query
          name: limit
          schema:
            type: integer
            example: 10
        - in: query
          name: page
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Requests retrieved successfully
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role not allowed
  /hospital/requests/{requestId}:
    get:
      tags:
        - Hospital
      summary: Get details for a specific hospital request
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Request details retrieved successfully
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role not allowed or unauthorized access
        "404":
          description: Request not found
    put:
      tags:
        - Hospital
      summary: Update the status of a hospital request
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
