            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - pending
                    - in-progress
                    - completed
                    - cancelled
                  example: in-progress
      responses:
        "200":
          description: Request status updated successfully
        "400":
          description: Invalid status payload
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role not allowed or unauthorized access
        "404":
          description: Request not found
    delete:
      tags:
        - Hospital
      summary: Cancel a hospital request
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Request cancelled successfully
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role not allowed or unauthorized access
        "404":
          description: Request not found
  /hospital/donations:
