openapi: 3.0.0
info:
  title: LifeLink API
  version: 1.0.0
  description: OpenAPI documentation for the LifeLink donation platform API. All
    routes are mounted at root paths.
servers:
  - url: http://localhost:5000
    description: Production server
  - url: http://localhost:5000
    description: Development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    BaseUser:
      type: object
      required:
        - fullName
        - email
        - password
        - role
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum:
            - donor
            - hospital
            - admin
    SignupDonorRequest:
      allOf:
        - $ref: "#/components/schemas/BaseUser"
        - type: object
          required:
            - phoneNumber
            - dateOfBirth
            - bloodType
            - confirmPassword
          properties:
            phoneNumber:
              type: string
            dateOfBirth:
              type: string
              format: date
            bloodType:
              type: string
            confirmPassword:
              type: string
              format: password
    SignupHospitalRequest:
      allOf:
        - $ref: "#/components/schemas/BaseUser"
        - type: object
          required:
            - hospitalName
            - licenseNumber
          properties:
            hospitalName:
              type: string
            licenseNumber:
              type: string
            phone:
              type: string
            contactNumber:
              type: string
            type:
              type: string
              example: hospital
    LoginRequest:
      type: object
      required:
        - email
        - password
        - role
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum:
            - donor
            - hospital
            - admin
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    EmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    TokenRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    OtpRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    FcmTokenRequest:
      type: object
      required:
        - fcmToken
      properties:
        fcmToken:
          type: string
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    ApiSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          nullable: true
    ApiErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
security:
  - bearerAuth: []
paths:
  /donor/activity:
    get:
      tags:
        - Activity
      summary: Get the authenticated user's activity timeline
      description: >
        Returns a paginated, timestamped history of all user actions (donations,
        rewards, urgent responses, profile updates).

        Supports optional filtering by activity type.

        Results are sorted newest-first.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (1-indexed, default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page (default 20, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: type
          in: query
          description: Optional activity type filter
          schema:
            type: string
            enum:
              - donation
              - reward
              - emergency_response
              - profile_update
      responses:
        "200":
          description: Activity timeline retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      activities:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              example: 5f9d4a1b9d7c2e3c4f5a6b7c
                            type:
                              type: string
                              enum:
                                - donation
                                - reward
                                - emergency_response
                                - profile_update
                            action:
                              type: string
                              example: completed_donation
                            title:
                              type: string
                              example: Blood Donation Completed
                            description:
                              type: string
                              example: Donated 1 unit of A+ blood to Cairo Hospital
                            icon:
                              type: string
                              example: heart
                            referenceId:
                              type: string
                              nullable: true
                              example: 5f9d4a1b9d7c2e3c4f5a6b7c
                            referenceType:
                              type: string
                              nullable: true
                              example: Donation
                            metadata:
                              type: object
                              example:
                                bloodType: A+
                                hospitalName: Cairo Hospital
                                quantity: 1
                            createdAt:
                              type: string
                              format: date-time
                              example: 2026-05-04T12:00:00.000Z
                      pagination:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 42
                          page:
                            type: integer
                            example: 1
                          limit:
                            type: integer
                            example: 20
                          totalPages:
                            type: integer
                            example: 3
                          hasNextPage:
                            type: boolean
                            example: true
                          hasPrevPage:
                            type: boolean
                            example: false
        "400":
          description: Invalid query parameters
        "401":
          description: Missing or invalid JWT
        "500":
          description: Server error
  /admin/login:
    post:
      summary: Login for admin and superadmin accounts
      tags:
        - Admin
      description: Authenticate admin or superadmin user. Returns JWT token for
        subsequent requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - adminKey
              properties:
                email:
                  type: string
                  format: email
                  description: Admin email address
                  example: admin@lifelink.com
                password:
                  type: string
                  format: password
                  description: Admin password
                  example: SecurePassword123!
                adminKey:
                  type: string
                  description: Admin secret key for authentication
                  example: admin-secret-key-2026
      responses:
        "200":
          description: Admin login successful - returns JWT token
        "401":
          description: Invalid credentials
        "403":
          description: Admin key invalid or account not authorized
  /admin/profile:
    get:
      summary: Get admin profile
      tags:
        - Admin
      description: Retrieve the authenticated admin's profile information
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin profile
  /admin/system/health:
    get:
      summary: System health check
      tags:
        - Admin - System
      security:
        - bearerAuth: []
      responses:
        "200":
          description: System health status
  /admin/system/maintenance:
    post:
      summary: Toggle maintenance mode
      tags:
        - Admin - System
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - enabled
              properties:
                enabled:
                  type: boolean
                message:
                  type: string
      responses:
        "200":
          description: Maintenance mode updated
    get:
      summary: Get maintenance mode status
      tags:
        - Admin - System
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Maintenance status
  /admin/statistics:
    get:
      summary: Get admin statistics summary
      tags:
        - Admin - Analytics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Statistics summary
  /admin/alerts:
    get:
      tags:
        - Admin
      summary: Get the admin alert summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Alerts summary
  /admin/blood-inventory-summary:
    get:
      tags:
        - Admin
      summary: Get the system blood inventory summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Blood inventory summary
  /admin/audit-logs:
    get:
      summary: List audit logs
      tags:
        - Admin - Audit
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: targetType
          schema:
            type: string
            enum:
              - User
              - Request
              - Donation
              - System
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs list
  /admin/donors:
    get:
      tags:
        - Admin
      summary: List donors
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Donor list
  /admin/hospitals:
    get:
      tags:
        - Admin
      summary: List hospitals
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Hospital list
  /admin/donors/{id}:
    get:
      tags:
        - Admin
      summary: Get a donor by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Donor details
    put:
      tags:
        - Admin
      summary: Update a donor
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                  format: email
                phoneNumber:
                  type: string
                bloodType:
                  type: string
                gender:
                  type: string
                dateOfBirth:
                  type: string
                  format: date
                isAvailable:
                  type: boolean
      responses:
        "200":
          description: Donor updated successfully
        "404":
          description: Donor not found
        "409":
          description: Email already registered
  /admin/hospitals/{id}:
    get:
      tags:
        - Admin
      summary: Get a hospital by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hospital details
  /admin/admins:
    get:
      tags:
        - Admin
      summary: List admin users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin list
    post:
      tags:
        - Admin
      summary: Create a new admin account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
                - password
              properties:
                fullName:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                role:
                  type: string
                  enum:
                    - admin
                    - superadmin
                location:
                  type: object
      responses:
        "201":
          description: Admin created successfully
        "400":
          description: Invalid payload
        "403":
          description: Only superadmin can create admins
        "409":
          description: Email already registered
  /admin/admins/{id}:
    get:
      tags:
        - Admin
      summary: Get an admin by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Admin details
    put:
      tags:
        - Admin
      summary: Update an admin account
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                role:
                  type: string
                  enum:
                    - admin
                    - superadmin
                isEmailVerified:
                  type: boolean
                isSuspended:
                  type: boolean
      responses:
        "200":
          description: Admin updated successfully
        "404":
          description: Admin not found
        "409":
          description: Email already registered
    delete:
      tags:
        - Admin
      summary: Delete an admin account
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Admin deleted successfully
        "403":
          description: Cannot delete own account or insufficient role
        "404":
          description: Admin not found
  /admin/donors/{id}/ban:
    post:
      tags:
        - Admin
      summary: Ban a donor
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Donor banned successfully
        "400":
          description: Donor already banned
        "404":
          description: Donor not found
  /admin/donors/{id}/unban:
    post:
      tags:
        - Admin
      summary: Unban a donor
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Donor unbanned successfully
        "400":
          description: Donor is not banned
        "404":
          description: Donor not found
  /admin/hospitals/{id}/status:
    put:
      tags:
        - Admin
      summary: Update hospital suspension status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  enum:
                    - suspend
                    - unsuspend
                reason:
                  type: string
      responses:
        "200":
          description: Hospital status updated successfully
        "400":
          description: Invalid action payload
        "404":
          description: Hospital not found
  /admin/permissions/roles:
    get:
      tags:
        - Admin
      summary: List role permissions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Roles retrieved successfully
    post:
      tags:
        - Admin
      summary: Create a role permission record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
                - displayName
              properties:
                role:
                  type: string
                  description: Unique role identifier
                displayName:
                  type: string
                  description: Human-readable role name
                description:
                  type: string
                  description: Role description
                isSystemRole:
                  type: boolean
                  description: Whether this is a system role (cannot be modified)
                permissions:
                  type: object
                  description: Role permissions object
      responses:
        "201":
          description: Role created successfully
        "400":
          description: Invalid payload - role and displayName are required
        "403":
          description: System roles cannot be created or modified
        "409":
          description: Role already exists
  /admin/permissions/roles/{role}:
    get:
      tags:
        - Admin
      summary: Get a role permission record
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: role
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Role retrieved successfully
    put:
      tags:
        - Admin
      summary: Update role permissions - Only allows updating displayName,
        description, and permissions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: role
          required: true
          schema:
            type: string
          description: Role identifier (cannot be changed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  description: Human-readable role name - CAN BE UPDATED
                  example: Senior Moderator
                description:
                  type: string
                  description: Role description - CAN BE UPDATED
                  example: Manages content and escalates issues
                permissions:
                  type: object
                  description: Role permissions object - CAN BE UPDATED
                  properties:
                    donor_management:
                      type: object
                      properties:
                        view:
                          type: boolean
                        manage:
                          type: boolean
                        ban:
                          type: boolean
                        suspend:
                          type: boolean
                        create:
                          type: boolean
                        delete:
                          type: boolean
                        export:
                          type: boolean
                    hospital_management:
                      type: object
                      properties:
                        view:
                          type: boolean
                        manage:
                          type: boolean
                        ban:
                          type: boolean
                        suspend:
                          type: boolean
                        create:
                          type: boolean
                        delete:
                          type: boolean
                        export:
                          type: boolean
                    admin_management:
                      type: object
                      properties:
                        view:
                          type: boolean
                        manage:
                          type: boolean
                        create:
                          type: boolean
                        delete:
                          type: boolean
                    system_settings:
                      type: object
                      properties:
                        view:
                          type: boolean
                        manage:
                          type: boolean
                    audit_logging:
                      type: object
                      properties:
                        view:
                          type: boolean
                        export:
                          type: boolean
                    reporting:
                      type: object
                      properties:
                        view:
                          type: boolean
                        export:
                          type: boolean
      responses:
        "200":
          description: Role permissions updated successfully
        "403":
          description: System roles (admin, superadmin, donor, hospital) cannot be modified
        "404":
          description: Role not found
    delete:
      tags:
        - Admin
      summary: Delete a role permission record
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: role
          required: true
          schema:
            type: string
          description: Role identifier to delete
      responses:
        "200":
          description: Role deleted successfully
        "403":
          description: System roles (admin, superadmin, donor, hospital) cannot be deleted
        "404":
          description: Role not found
  /admin/users:
    get:
      summary: List all users with filters and pagination
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum:
              - donor
              - hospital
              - admin
              - superadmin
        - in: query
          name: verified
          schema:
            type: string
            enum:
              - "true"
              - "false"
        - in: query
          name: suspended
          schema:
            type: string
            enum:
              - "true"
              - "false"
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Users list
  /admin/users/stats:
    get:
      summary: Get user statistics
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User statistics
  /admin/users/hospital:
    post:
      summary: Create a new hospital (admin-created, pre-verified)
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
                - password
                - hospitalName
                - hospitalId
                - licenseNumber
                - lat
                - long
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                hospitalName:
                  type: string
                hospitalId:
                  type: number
                licenseNumber:
                  type: string
                address:
                  type: object
                  properties:
                    city:
                      type: string
                    governorate:
                      type: string
                contactNumber:
                  type: string
                lat:
                  type: number
                  format: double
                  description: Hospital latitude coordinate (-90 to 90)
                  example: 30.0444
                long:
                  type: number
                  format: double
                  description: Hospital longitude coordinate (-180 to 180)
                  example: 31.2357
      responses:
        "201":
          description: Hospital created
        "400":
          description: Invalid lat/long coordinates
        "409":
          description: Email already registered
  /admin/users/{id}:
    get:
      summary: Get user details by ID
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
        "404":
          description: User not found
    delete:
      summary: Soft-delete a user account
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deleted
        "403":
          description: Cannot delete admin accounts
  /admin/users/{id}/verify:
    patch:
      summary: Verify a user's email
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User verified
  /admin/users/{id}/unverify:
    patch:
      summary: Unverify a user's email
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User unverified
  /admin/users/{id}/suspend:
    patch:
      summary: Suspend a user account
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: User suspended
        "403":
          description: Cannot suspend admin accounts
  /admin/users/{id}/unsuspend:
    patch:
      summary: Unsuspend a user account
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User unsuspended
  /admin/requests:
    get:
      summary: List all blood/organ requests
      tags:
        - Admin - Requests
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - pending
              - in-progress
              - completed
              - cancelled
        - in: query
          name: urgency
          schema:
            type: string
            enum:
              - low
              - medium
              - high
              - critical
        - in: query
          name: bloodType
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum:
              - blood
              - organ
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Requests list
  /admin/requests/stats:
    get:
      summary: Get request statistics
      tags:
        - Admin - Requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Request statistics
  /admin/requests/{id}:
    get:
      summary: Get full request details with donations
      tags:
        - Admin - Requests
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
