  /donor/participation:
    put:
      tags:
        - Donor
      summary: Update donor participation preference
      description: |
        Allows a donor to opt in or out of donor matching.
        This updates **participation preference only** — it does NOT affect
        medical eligibility, which is computed dynamically from donation history,
        deferral state, and health fields.

        Both `isOptedIn` (new) and `isAvailable` (legacy) are accepted
        for backward compatibility. Internally always stored as `isOptedIn`.

        Demo seed available via `npm run seed-demo`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isOptedIn:
                  type: boolean
                  description: >-
                    `true` = donor wants to receive requests and appear in
                    matching. `false` = donor opts out of all matching.
                  example: false
                isAvailable:
                  type: boolean
                  description: Legacy alias for isOptedIn. Prefer isOptedIn for new integrations.
                  example: false
            examples:
              new_field:
                summary: New API (preferred)
                value:
                  isOptedIn: false
              legacy_field:
                summary: Legacy API (backward compat)
                value:
                  isAvailable: false
      responses:
        "200":
          description: Participation preference updated successfully
          content:
            application/json:
              example:
                success: true
                message: Participation preference updated successfully
                data:
                  _id: 66f100000000000000000002
                  fullName: Aya Hassan
                  isOptedIn: false
        "400":
          description: Invalid payload
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role not allowed
