  /requests/{id}/accept:
    post:
      tags:
        - Donor
      summary: Donor accepts a hospital request (Hospital Request flow)
      security:
        - bearerAuth: []
      description: |-
        A donor accepts a pending hospital request. Creates a Donation record with a QR token.
        Supports multi-donor acceptance: the request stays `pending` until enough donors
        have pledged to meet `unitsNeeded`, then transitions to `accepted`.

        When `unitsAccepted >= unitsNeeded`, `fullyAccepted` is `true` and the request
        status changes to `accepted`. Otherwise the request remains `pending` and more
        donors can respond.

        The arrival deadline and QR expiration are determined by the request's urgency level:
        - critical: 3 hours arrival, 15 minute re-broadcast interval
        - emergency: 6 hours arrival, 30 minute re-broadcast interval
        - high: 12 hours arrival, 1 hour re-broadcast interval
        - medium: 24 hours (1 day) arrival, 4 hour re-broadcast interval
        - low: 48 hours (2 days) arrival, 12 hour re-broadcast interval

        Eligibility is enforced: blood compatibility, cooldown, opted-in, not suspended/deferred,
        email verified, no active donation, no prior response to this request.

        On each donation acceptance:
        - The hospital receives an in-app Notification + FCM push with donor details
        - The donor receives an in-app Notification + FCM push with hospital name, arrival deadline, and QR
        - The response includes the donor's `missedDonationCount` and
          `missedDonationRemaining` (remaining strikes before auto-suspension at 3).
        - No-show tracking: if a donor fails to arrive before the deadline, their
          `missedDonationCount` increments. After 3 missed donations, their account is
          auto-suspended.

        Only donors can accept requests.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Request identifier
          example: 69fe540565ff7785a031314f
      responses:
        "200":
          description: Request accepted successfully
          content:
            application/json:
              example:
                success: true
                message: Response submitted
                data:
                  requestId: 69fe540565ff7785a031314f
                  donationId: 69fe540565ff7785a031314a
                  status: accepted
                  qrToken: a18df3083c83f3a8c1d90a61d6c70a0f5316897f4feefdc9611b32ad7dd114e2
                  qrExpiresAt: 2026-05-18T11:45:00.000Z
                  acceptedAt: 2026-05-18T09:45:00.000Z
                  arrivalDeadline: 2026-05-18T11:45:00.000Z
                  unitsAccepted: 3
                  unitsNeeded: 3
                  fullyAccepted: true
                  missedDonationCount: 0
                  missedDonationRemaining: 3
        "400":
          description: Invalid request id, request not pending, donor not eligible, or units exceed remaining needed
        "403":
          description: Non-donor role attempted to accept
        "404":
          description: Request not found
  /requests/{id}/cancel:
    post:
      tags:
        - Donor
      summary: Cancel a request or your acceptance of it
      security:
        - bearerAuth: []
      description: |-
        Cancels a request. Donors can cancel only their own accepted request; hospitals can cancel their own request; admins can cancel any request.
      parameters:
