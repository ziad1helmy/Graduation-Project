  /admin/rewards:
    get:
      summary: Get all admin rewards data for the 3 tabs
      description: |
        Returns all data needed for the Overview, Configuration, and Adjust Points tabs in a single call.
        When `?query=` is provided, also returns matching users for the points adjustment search.

        **Overview tab fields:** `totalPoints`, `percentageChange`, `tiers`, `topRedeemed`, `catalog`
        **Configuration tab fields:** `catalog` (same resource, filtered/edited on frontend)
        **Adjust Points tab fields:** `adjustments`, `users` (when `?query=` is set)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          schema:
            type: string
          description: Search users by ID or email for the adjust-points user lookup
          example: john@example.com
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 5
          description: Number of top-redeemed rewards to return
        - in: query
          name: adjustments
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of recent point adjustments to return
      responses:
        "200":
          description: |
            Successful response. Contains all reward data. The `users` array is only present when `?query=` was provided.
          content:
            application/json:
              example:
                success: true
                message: Rewards data retrieved successfully
                data:
                  totalPoints: 48200
                  percentageChange: 12.5
                  tiers:
                    - tierName: bronze
                      userCount: 120
                    - tierName: silver
                      userCount: 80
                    - tierName: gold
                      userCount: 30
                    - tierName: platinum
                      userCount: 10
                  topRedeemed:
                    - rewardName: Coffee Voucher
                      rewardSubtitle: Free coffee at partner cafes
                      pointsRedeemed: 17000
                    - rewardName: Movie Tickets
                      rewardSubtitle: 2 movie tickets at major cinemas
                      pointsRedeemed: 18000
                  catalog:
                    items:
                      - id: 664a123456789abcdef12345
                        rewardName: Coffee Voucher
                        category: FOOD
                        pointsRequired: 500
                        redeemedCount: 34
                        status: ACTIVE
                      - id: 664a123456789abcdef12346
                        rewardName: Movie Tickets
                        category: ENTERTAINMENT
                        pointsRequired: 1000
                        redeemedCount: 18
                        status: ACTIVE
                    totalCount: 6
                  adjustments:
                    - userName: John Doe
                      userId: 69f3df915f42685cbbbcbb18
                      reason: Community engagement bonus
                      points: 200
                      date: "2026-06-20T14:30:00.000Z"
                      adminName: Admin User
                    - userName: Jane Smith
                      userId: 69f3df915f42685cbbbcbb19
                      reason: Correction for missed donation
                      points: -100
                      date: "2026-06-19T10:15:00.000Z"
