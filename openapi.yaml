      parameters:
        - in: query
          name: city
          schema:
            type: string
        - in: query
          name: governorate
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: skip
          schema:
            type: integer
          description: Legacy pagination alias still supported for compatibility.
      responses:
        '200':
          description: Hospitals list
  /hospitals/nearby:
    get:
      summary: List nearby hospitals
      tags:
        - Discovery
      description: Returns hospitals sorted by computed distance when coordinate-backed hospital locations exist.
      parameters:
        - in: query
          name: latitude
          schema:
            type: number
        - in: query
          name: longitude
          schema:
            type: number
        - in: query
          name: radius_km
          schema:
            type: number
      responses:
        '200':
          description: Nearby hospitals list
  /hospitals/{id}:
    get:
      summary: Get hospital details by id
      tags:
        - Discovery
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hospital details
  /donations/book-appointment:
    post:
      tags:
        - Appointments
      summary: Book a donor appointment with a hospital
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hospitalId
                - appointmentDate
              properties:
                hospitalId:
                  type: string
                requestId:
                  type: string
                  nullable: true
                appointmentDate:
                  type: string
                  format: date-time
                notes:
                  type: string
                  maxLength: 500
            example:
              hospitalId: 66f100000000000000000010
              requestId: 66f100000000000000000020
              appointmentDate: '2026-05-10T10:00:00.000Z'
              notes: First-time donor, available in the morning.
      responses:
        '201':
          description: Appointment booked
        '400':
          description: Invalid appointment payload
        '401':
          description: Missing or invalid JWT
        '403':
          description: Role not allowed
        '404':
          description: Hospital, donor, or request not found
        '409':
          description: Active appointment already exists for this hospital
  /donations/book-appointment/my-appointments:
    get:
      tags:
        - Appointments
      summary: Get the authenticated donor appointments
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Appointments fetched successfully
        '401':
          description: Missing or invalid JWT
        '403':
          description: Role not allowed
  /donations/book-appointment/{appointmentId}:
    delete:
      tags:
        - Appointments
      summary: Cancel a donor appointment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Appointment cancelled
        '400':
          description: Invalid appointment id
        '401':
          description: Missing or invalid JWT
        '403':
          description: Role not allowed
        '404':
          description: Appointment not found
  /donations/my-appointments:
    get:
      tags:
        - Appointments
      summary: Get donor appointments via the donations compatibility alias
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Appointments fetched successfully
        '401':
          description: Missing or invalid JWT
        '403':
          description: Role not allowed
  /donations/complete:
    post:
      tags:
        - Donations
      summary: Mark a donation as completed
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - donationId
      responses:
        '200':
          description: Donation completed successfully
        '400':
          description: Invalid donation payload
        '401':
          description: Missing or invalid JWT
        '403':
          description: Role not allowed
