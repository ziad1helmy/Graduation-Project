          description: Donation not found
  /appointments/verify-qr:
    post:
      tags:
        - Hospital
      summary: Verify donor QR code at hospital check-in
      description: |-
        Hospital staff scans the donor's QR code to start the hospital verification flow.
        - Validates the QR token, checks expiry and one-time usage
        - Confirms donor eligibility and appointment activity
        - Returns the donor profile and appointment details for the verification screen

        Subsequent steps use the checklist, reject, and rescan endpoints before the final donation confirmation.

        **Role required:** hospital | admin | superadmin


        Demo seed available via `npm run seed-demo`. Base URL example: https://graduation-project-cy61.onrender.com This operation includes a seeded demo request example.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - qrToken
              properties:
                qrToken:
                  type: string
                  description: The secure QR token scanned from the donor's device
                  example: a3f9c1e82b4d...
            example:
              qrToken: demo-qr-noor-verify
      responses:
        "200":
          description: Donation verification started successfully
          content:
            application/json:
              example:
                success: true
                message: Donation verification started successfully
                data:
                  verificationStatus: pending
                  verificationSessionId: 2a9d4f6f5f4e4f2e8e2f5a2d1e0c9b8a
                  appointment:
                    id: 69fe540565ff7785a031315c
                    appointmentDate: 2026-05-07T12:00:00.000Z
                    status: confirmed
                    donationType: Whole Blood
                    qrToken: demo-qr-noor-verify
                    qrScannedAt: 2026-05-07T09:00:00.000Z
                    qrExpiresAt: 2026-05-08T09:00:00.000Z
                  donor:
                    id: 69f3df915f42685cbbbcbb18
                    fullName: Aya Hassan
                    initials: AH
                    bloodType: O+
                    phoneNumber: "01011111111"
                    email: aya.hassan@lifelink.demo
                    navigationUrl: https://www.google.com/maps/dir/?api=1&destination=30.0444,31.2357
                  eligibility:
                    eligible: true
                    reason: Donor is eligible
                  checklistRequirements:
                    idVerified: true
                    questionnaireCompleted: true
                    consentSigned: true
        "400":
          description: |
            One of:
            - qrToken is required
            - QR code expired
            - Appointment is cancelled
            - Appointment is not active
        "401":
          description: Missing or invalid JWT token
        "403":
          description: Donor is not eligible to donate
        "404":
          description: Invalid QR code (token not found)
        "409":
          description: QR code already used
