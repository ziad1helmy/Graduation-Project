openapi: 3.0.0
info:
  title: LifeLink API
  version: 1.0.0
  description: OpenAPI documentation for the LifeLink donation platform API. All
    routes are mounted at root paths. For realistic data and examples, run `npm
    run seed-demo` and use the seeded demo credentials, QR tokens, and printed
    IDs.
servers:
  - url: https://graduation-project-cy61.onrender.com
    description: Production server
  - url: http://localhost:5000
    description: Development server
tags:
  - name: Auth
    description: Registration, login, email verification, password reset, and
      token management for all roles
  - name: Donor
    description: "All donor-facing endpoints: profile, dashboard, urgent requests,
      appointments, donation history, rewards, badges, activity, settings,
      notifications, hospitals, and analytics"
  - name: Hospital
    description: "Hospital self-management: profile, blood bank, capacity, QR
      verification, request management"
  - name: Admin
    description: "Admin operations: user management, analytics, rewards, system
      maintenance, metrics, audit logs, and inbound email management"
  - name: Support
    description: "Help, FAQ, document views, and contact support ticket creation"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    BaseUser:
      type: object
      required:
        - fullName
        - email
        - password
        - role
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum:
            - donor
            - hospital
            - admin
    SignupDonorRequest:
      allOf:
        - $ref: "#/components/schemas/BaseUser"
        - type: object
          required:
            - phoneNumber
            - dateOfBirth
            - bloodType
            - confirmPassword
          properties:
            phoneNumber:
              type: string
            dateOfBirth:
              type: string
              format: date
            bloodType:
              type: string
            confirmPassword:
              type: string
              format: password
            gender:
              type: string
              enum:
                - male
                - female
              description: Donor gender
            location:
              type: object
              properties:
                lat:
                  type: number
                  format: float
                  description: Donor latitude coordinate (-90 to 90)
                lng:
                  type: number
                  format: float
                  description: Donor longitude coordinate (-180 to 180)
                latitude:
                  type: number
                  format: float
                  description: Alias for lat
                longitude:
                  type: number
                  format: float
                  description: Alias for lng
                city:
                  type: string
                  description: City name
                  example: Cairo
                governorate:
                  type: string
                  description: Governorate name
                  example: Cairo
    UpdateDonorProfileRequest:
      type: object
      properties:
        fullName:
          type: string
          minLength: 3
          maxLength: 100
          description: Donor full name (letters, spaces, dots, dashes only)
          example: Aya Hassan
        email:
          type: string
          format: email
          description: Donor email address. Changing this will trigger a verification
            status reset.
          example: aya.hassan@example.com
        dateOfBirth:
          type: string
          format: date
          description: Donor date of birth (must be a valid past date)
          example: 1995-05-15
        phoneNumber:
          type: string
          pattern: '^[0-9]{11}$'
          description: Donor phone number (must be exactly 11 digits)
          example: "01011111111"
        gender:
          type: string
          enum:
            - male
            - female
          description: Donor gender
          example: female
        bloodType:
          type: string
          enum:
            - A+
            - A-
            - B+
            - B-
            - AB+
            - AB-
            - O+
            - O-
          description: Blood type of the donor
          example: O+
        weight:
          type: number
          minimum: 0
          description: Donor weight in kilograms
          example: 60
        location:
          type: object
          description: Donor location information
          properties:
            city:
              type: string
              example: Cairo
            governorate:
              type: string
              example: Cairo
            coordinates:
              type: object
              properties:
                lat:
                  type: number
                  format: float
                  example: 30.0444
                lng:
                  type: number
                  format: float
                  example: 31.2357
    DonorProfile:
      type: object
      properties:
        _id:
          type: string
          readOnly: true
          example: 66f100000000000000000002
        fullName:
          type: string
          example: Aya Hassan
        email:
          type: string
          format: email
          example: aya.hassan@example.com
        role:
          type: string
          readOnly: true
          example: donor
        phoneNumber:
          type: string
          example: "01011111111"
        bloodType:
          type: string
          example: O+
        gender:
          type: string
          example: female
        weight:
          type: number
          example: 60
        location:
          type: object
          properties:
            city:
              type: string
              example: Cairo
            governorate:
              type: string
              example: Cairo
            coordinates:
              type: object
              properties:
                lat:
                  type: number
                  format: float
                  example: 30.0444
                lng:
                  type: number
                  format: float
                  example: 31.2357
            lastUpdated:
              type: string
              format: date-time
              readOnly: true
              example: 2026-05-18T09:05:00.000Z
        dateOfBirth:
          type: string
          format: date
          example: 1995-05-15
        isOptedIn:
          type: boolean
          description: |
            Donor participation preference — `true` means the donor wants to
            receive donation requests and appear in matching results.
            This is distinct from medical eligibility, which is computed
            dynamically from donation history, deferral state, and health fields.
          readOnly: true
          example: true
        isEmailVerified:
          type: boolean
          readOnly: true
          example: true
        verificationStatus:
          type: string
          readOnly: true
          example: verified
        age:
          type: integer
          readOnly: true
          example: 31
        stats:
          type: object
          readOnly: true
          properties:
            totalDonations:
              type: integer
              example: 8
            points:
              type: integer
              example: 2340
            livesSaved:
              type: integer
              example: 24
        currentBadge:
          type: string
          readOnly: true
          example: First Timer
        nextBadge:
          type: string
          readOnly: true
          example: Regular Donor
        progressPercentage:
          type: integer
          readOnly: true
          example: 40
        badgeProgress:
          type: object
          readOnly: true
          properties:
            currentBadge:
              type: string
              example: First Timer
            nextBadge:
              type: string
              example: Regular Donor
            progressPercentage:
              type: integer
              example: 40
        createdAt:
          type: string
          format: date-time
          readOnly: true
          example: 2026-01-15T09:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          example: 2026-05-18T09:05:00.000Z
    DonorProfileResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Donor profile retrieved successfully
        data:
          $ref: "#/components/schemas/DonorProfile"
    UpdateDonorProfileResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Donor profile updated successfully
        data:
          $ref: "#/components/schemas/DonorProfile"
    InboundEmail:
      type: object
      properties:
        _id:
          type: string
        provider:
          type: string
          example: resend
        providerEventId:
          type: string
          nullable: true
        messageId:
          type: string
          nullable: true
        from:
          type: string
          example: donor.followup@lifelink.demo
        to:
          type: array
          items:
            type: string
        cc:
          type: array
          items:
            type: string
        bcc:
          type: array
          items:
            type: string
        subject:
          type: string
        text:
          type: string
        html:
          type: string
        headers:
          type: object
          additionalProperties: true
        attachments:
          type: array
          items:
            type: object
            additionalProperties: true
        isRead:
          type: boolean
        readAt:
          type: string
          format: date-time
          nullable: true
        isArchived:
          type: boolean
        archivedAt:
          type: string
          format: date-time
          nullable: true
        receivedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    InboundEmailListResponse:
      type: object
      properties:
        inboundEmails:
          type: array
          items:
            $ref: "#/components/schemas/InboundEmail"
        pagination:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer
            hasNextPage:
              type: boolean
            hasPrevPage:
              type: boolean
    LoginRequest:
      type: object
      required:
        - email
        - password
        - role
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum:
            - donor
            - hospital
            - admin
        hospitalId:
          type: string
          description: Required only for hospital login
        adminCode:
          type: string
          description: Required only for admin login
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    EmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    VerificationOtpRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
    OtpRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    VerificationEmailStatus:
      type: object
      properties:
        sent:
          type: boolean
        skipped:
          type: boolean
        reason:
          type: string
        error:
          type: string
    SignupResponseData:
      type: object
      required:
        - user
        - tokens
      properties:
        user:
          type: object
          description: Created user document
        tokens:
          $ref: "#/components/schemas/AuthTokens"
        locationRequired:
          type: boolean
          description: true when registration completed without GPS coordinates
        verificationEmail:
          $ref: "#/components/schemas/VerificationEmailStatus"
    FcmTokenRequest:
      type: object
      required:
        - fcmToken
      properties:
        fcmToken:
          type: string
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    ApiSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          nullable: true
    ApiErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
    Activity:
      type: object
      required:
        - id
        - title
        - description
        - type
        - createdAt
      properties:
        id:
          type: string
          description: Activity unique identifier
paths:
  /auth/me:
    get:
      tags:
        - Auth
      summary: Get the authenticated user document
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated user retrieved
          content:
            application/json:
              example:
                success: true
                message: User retrieved
                data:
                  _id: 69f3df915f42685cbbbcbb18
                  fullName: Aya Hassan
                  email: aya.hassan@lifelink.demo
                  role: donor
                  isEmailVerified: true
        "401":
          description: Missing or invalid JWT
  /auth/validate-token:
    post:
      tags:
        - Auth
      summary: Validate current JWT and return session state
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              example:
                success: true
                message: Token is valid
                data:
                  is_valid: true
                  user_role: donor
                  user_id: 69f3df915f42685cbbbcbb18
                  role: donor
                  userId: 69f3df915f42685cbbbcbb18
      description: "Demo seed available via `npm run seed-demo`. Base URL example:
        https://graduation-project-cy61.onrender.com Parameter examples are
        aligned with the seeded demo dataset where possible."
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Register a new donor account
      description: |-
        Create a new donor account. Donor signup requires phoneNumber, dateOfBirth, bloodType.

        Demo seed available via `npm run seed-demo`. Base URL example: https://graduation-project-cy61.onrender.com Parameter examples are aligned with the seeded demo dataset where possible.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupDonorRequest"
            example:
              fullName: Aya Hassan
              email: aya.hassan@lifelink.demo
              password: DonorPass@123
              confirmPassword: DonorPass@123
              role: donor
              phoneNumber: "01011111111"
              dateOfBirth: 1995-05-15
              bloodType: O+
              gender: female
              location:
                city: Cairo
                governorate: Cairo
                coordinates:
                  lat: 30.0444
                  lng: 31.2357
      responses:
        "201":
          description: User registered successfully - Email verification processed
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/SignupResponseData"
              example:
                success: true
                data:
                  user:
                    fullName: Aya Hassan
                    email: aya.hassan@lifelink.demo
                    role: donor
                  tokens:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  verificationEmail:
                    sent: true
        "400":
          description: Validation or registration error
        "409":
          description: Email already registered
  /auth/verify-email:
    post:
      tags:
        - Auth
      summary: Send an email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
            example:
              email: aya.hassan@lifelink.demo
      responses:
        "200":
          description: Verification code sent successfully
          content:
            application/json:
              example:
                success: true
                message: Verification code sent
      description: "Demo seed available via `npm run seed-demo`. Base URL example:
        https://graduation-project-cy61.onrender.com This operation includes a
        seeded demo request example."
  /auth/verify-email-otp:
    post:
      tags:
        - Auth
      summary: Verify email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationOtpRequest"
            example:
              email: aya.hassan@lifelink.demo
              otp: "123456"
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              example:
                success: true
                message: Email verified successfully
      description: "Demo seed available via `npm run seed-demo`. Base URL example:
        https://graduation-project-cy61.onrender.com This operation includes a
        seeded demo request example."
  /auth/login:
    post:
      tags:
        - Auth
      summary: Donor login with email and password
      description: |-
        Authenticate as a donor user. Returns JWT token.

        Demo seed available via `npm run seed-demo`. Base URL example: https://graduation-project-cy61.onrender.com This operation includes a seeded demo request example.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: aya.hassan@lifelink.demo
              password: DonorPass@123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              example:
                success: true
                message: Login successful
                data:
                  accessToken: eyJ...access
                  refreshToken: eyJ...refresh
                  verified: true
                  user:
                    _id: 69f3df915f42685cbbbcbb18
                    fullName: Aya Hassan
                    email: aya.hassan@lifelink.demo
                    role: donor
                    isEmailVerified: true
        "400":
          description: Validation error or invalid credentials
        "403":
          description: Email not verified or account suspended
  /auth/hospital/login:
    post:
      tags:
        - Auth
      summary: Hospital login with email and password
      description: |-
        Authenticate as a hospital user. Returns JWT token

        Demo seed available via `npm run seed-demo`. Base URL example: https://graduation-project-cy61.onrender.com This operation includes a seeded demo request example.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - hospitalId
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                hospitalId:
                  type: string
            example:
              email: ops@cairocare.demo
              password: HospitalPass@123
              hospitalId: HOSP-CAIRO-001
      responses:
        "200":
          description: Hospital login successful
          content:
            application/json:
              example:
                success: true
                message: Login successful
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  verified: true
                  user:
                    _id: 69f3df915f42685cbbbcbb1b
                    fullName: Cairo Care Operations
                    email: ops@cairocare.demo
                    role: hospital
                    isEmailVerified: true
                  hospitalId: HOSP-CAIRO-001
        "400":
          description: Validation error or invalid credentials
        "403":
          description: Email not verified or hospital not approved
  /auth/admin/login:
    post:
      tags:
        - Auth
      summary: Admin/Superadmin login with email, password, and adminKey
      description: |-
        Authenticate as admin or superadmin. Requires email, password, and adminKey secret

        Demo seed available via `npm run seed-demo`. Base URL example: https://graduation-project-cy61.onrender.com This operation includes a seeded demo request example.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - adminKey
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                adminKey:
                  type: string
            example:
              email: admin@lifelink.demo
              password: AdminPass@123
              adminKey: ADMIN-DEMO-KEY-2026
      responses:
        "200":
          description: Admin login successful
          content:
            application/json:
              example:
                success: true
                message: Admin login successful
                data:
                  accessToken: eyJ...admin-access
                  refreshToken: eyJ...admin-refresh
                  user:
                    _id: 66f200000000000000000001
                    fullName: Noura Hassan
                    email: admin@lifelink.demo
                    role: admin
                    phone: "01099998888"
        "400":
          description: Validation error or invalid credentials
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout and blacklist a refresh token
      description: Invalidates the provided refresh token. If an `fcmToken` is
        supplied, it is also removed from the current user's registered push
        tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                refresh_token:
                  type: string
                fcmToken:
                  type: string
                fcm_token:
                  type: string
            example:
              refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
              fcmToken: eYJhbGciOi...
      responses:
        "200":
          description: Logout completed successfully
          content:
            application/json:
              example:
                success: true
                message: Logged out successfully
        "400":
          description: Refresh token is missing or invalid
  /auth/refresh-token:
    post:
      tags:
        - Auth
      summary: Exchange a refresh token for a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
            example:
              refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        "200":
          description: Access token refreshed successfully
          content:
            application/json:
              example:
                success: true
                message: Token refreshed
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "401":
          description: Refresh token is invalid or expired
  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request password reset (sends OTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
            example:
              email: aya.hassan@lifelink.demo
      responses:
        "200":
          description: Password reset email sent
          content:
            application/json:
              example:
                success: true
                message: Password reset email sent
      description: "Demo seed available via `npm run seed-demo`. Base URL example:
        https://graduation-project-cy61.onrender.com This operation includes a
        seeded demo request example."
  /auth/verify-otp:
    post:
      tags:
        - Auth
      summary: Verify password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
            example:
              email: aya.hassan@lifelink.demo
              otp: "123456"
      responses:
        "200":
          description: Password reset OTP verified successfully
          content:
            application/json:
              example:
                success: true
                message: Password reset OTP verified successfully
                data:
                  verified: true
                  email: aya.hassan@lifelink.demo
                  otp: "123456"
      description: "Demo seed available via `npm run seed-demo`. Base URL example:
        https://graduation-project-cy61.onrender.com This operation includes a
        seeded demo request example."
  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password using OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
                - password
              properties:
                email:
                  type: string
                otp:
                  type: string
                password:
                  type: string
            example:
              email: aya.hassan@lifelink.demo
              otp: "123456"
              password: NewPass@123
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              example:
                success: true
                message: Password reset successful
        "400":
          description: Invalid or expired OTP
      description: "Demo seed available via `npm run seed-demo`. Base URL example:
        https://graduation-project-cy61.onrender.com This operation includes a
        seeded demo request example."
  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Change the authenticated user's password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
                - confirmPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                confirmPassword:
                  type: string
            example:
              currentPassword: OldPass@123
              newPassword: NewPass@123
              confirmPassword: NewPass@123
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              example:
                success: true
                message: Password changed successfully
        "400":
          description: Validation error
        "401":
          description: Current password is incorrect
      description: "Demo seed available via `npm run seed-demo`. Base URL example:
        https://graduation-project-cy61.onrender.com This operation includes a
        seeded demo request example."
  /auth/fcm-token:
    post:
      tags:
        - Auth
      summary: Register an FCM token for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
