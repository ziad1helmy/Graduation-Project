  /requests/nearby:
    get:
      tags:
        - Donor
      summary: Get nearby requests around the caller's coordinates
      description: |-
        Returns real request records from the backend request store, enriched by `src/controllers/request.controller.js` with distance, hospital contact data, and map coordinates.
        This endpoint is available to `donor`, `hospital`, `admin`, and `superadmin` roles. It is request-centric, not donor-centric: it returns nearby requests/hospitals, not matched donor cards.
        Current controller behavior filters requests by active status (`pending` and `in-progress`) and optionally by `bloodType`, `type`, `urgency`, and `isEmergency`.
        When called by a donor, the same centralized matching rules used by `/donor/requests` are applied first, so donors with active donations receive an empty list.

        **Migration Note**: This endpoint replaces the deprecated endpoints:
        - `GET /donor/urgent-requests` → Use `GET /requests/nearby?urgency=critical`
        - `GET /donor/urgent-requests/{requestId}` → Use `GET /requests/{requestId}`

        Note: donor callers receive a reduced request payload with distance fields omitted. Hospital/admin viewers continue to receive `distanceKm`, `distanceMeters`, `viewerLocation`, and `radiusKm` when a location is provided.

        Demo seed available via `npm run seed-demo`. Base URL example: https://graduation-project-cy61.onrender.com Parameter examples are aligned with the seeded demo dataset where possible.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: lat
          schema:
            type: number
          required: false
          description: Viewer latitude used to compute distance and map positioning
          example: 30.0511
        - in: query
          name: lng
          schema:
            type: number
          required: false
          description: Viewer longitude used to compute distance and map positioning
          example: 31.2435
        - in: query
          name: radius
          schema:
            type: number
          description: Optional radius in kilometers. If omitted, the endpoint does not
            apply a radius filter.
          example: 25
        - in: query
          name: type
          schema:
            type: string
            enum:
              - blood
          description: Filter by request type
          example: blood
        - in: query
          name: bloodType
          schema:
            type: string
          description: Filter by blood type (for blood/plasma/platelets)
          example: O+
        - in: query
          name: urgency
          schema:
            type: string
            enum:
              - low
              - medium
              - high
              - critical
          description: |-
            Filter requests by urgency level.
            - Use `urgency=critical` or `urgency=high` to retrieve urgent requests.
            - This parameter replaces the deprecated `/donor/urgent-requests` endpoints.
            - If not specified, returns requests of all urgency levels.
          example: critical
        - in: query
          name: isEmergency
          schema:
            type: boolean
          description: When true, only emergency requests are returned
