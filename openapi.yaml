            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: filter
          schema:
            type: string
            enum:
              - ALL
              - EARNED
              - REDEEMED
              - ADJUSTMENTS
            default: ALL
        - in: query
          name: date_from
          schema:
            type: string
            format: date-time
        - in: query
          name: date_to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated points history
  /rewards/badges:
    get:
      summary: Get all badges and donor's progress
      tags:
        - Rewards - Donor
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Badge list with unlock status and progress
  /rewards/catalog:
    get:
      summary: Get available rewards catalog
      tags:
        - Rewards - Donor
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            type: string
            enum:
              - ALL
              - FOOD
              - ENTERTAINMENT
              - HEALTH
              - STATUS
        - in: query
          name: sort_by
          schema:
            type: string
            enum:
              - COST_ASC
              - COST_DESC
              - POPULARITY
      responses:
        '200':
          description: Rewards catalog
  /rewards/history:
    get:
      summary: Get donor reward history
      tags:
        - Rewards - Donor
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - ALL
              - PENDING
              - CONFIRMED
              - DELIVERED
              - CANCELLED
              - EXPIRED
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Reward history retrieved successfully
  /rewards/catalog/{rewardId}/redeem:
    post:
      summary: Redeem a reward using points
      tags:
        - Rewards - Donor
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: rewardId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                delivery_preference:
                  type: string
                  enum:
                    - IN_APP
                    - EMAIL
                  default: IN_APP
                delivery_contact:
                  type: string
                  description: Email address if delivery_preference is EMAIL
      responses:
        '200':
          description: Redemption confirmed with confirmation code
        '409':
          description: Insufficient points or limit exceeded
  /rewards/redemptions:
    get:
      summary: Get donor's redemption history
      tags:
        - Rewards - Donor
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - ALL
              - PENDING
              - CONFIRMED
              - DELIVERED
              - CANCELLED
              - EXPIRED
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Paginated redemption history
  /rewards/leaderboard:
    get:
      summary: Get the top donors leaderboard
      tags:
        - Rewards - Donor
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 50
          description: Number of top donors to return
      responses:
        '200':
          description: Ranked list of top donors by lifetime points
  /rewards/admin/users/{userId}/points/adjust:
    post:
      summary: Manually adjust a donor's points (admin only)
      tags:
        - Rewards - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - reason
              properties:
                amount:
                  type: integer
                  description: Positive to add, negative to deduct
                reason:
                  type: string
      responses:
        '200':
          description: Points adjusted and transaction logged
  /rewards/admin/catalog/{rewardId}/status:
    patch:
      summary: Update a reward's status (admin only)
      tags:
        - Rewards - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: rewardId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - ACTIVE
                    - INACTIVE
                    - LIMITED
