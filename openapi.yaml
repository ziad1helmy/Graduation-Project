        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: read
          schema:
            type: boolean
        - in: query
          name: type
          schema:
            type: string
      responses:
        '200':
          description: Notifications list
  /notifications/{id}/read:
    patch:
      summary: Mark one notification as read
      tags:
        - Notifications
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
