  /donations/book-appointment:
    post:
      tags:
        - Donor
      summary: Book a donor appointment with a hospital
      description: |
        Books an appointment for an authenticated donor at a hospital.

        **Important notes:**
        - Donors with an active donation (`pending` or `scheduled`) cannot book a new appointment
        - Donors can only have ONE active appointment per hospital
        - Concurrent booking attempts are handled atomically to prevent duplicates
        - Appointment date must be in the future and within hospital's scheduling window
        - Hospital must be verified and active to accept bookings
        - A QR token is generated for the booked appointment and returned in the response
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hospitalId
                - appointmentDate
              properties:
                hospitalId:
                  type: string
                requestId:
                  type: string
                  nullable: true
                appointmentDate:
                  type: string
                  format: date-time
                donationType:
                  type: string
                  description: Donation type (e.g. "Whole Blood", "Plasma", "Platelets", "Double Red Cells")
                notes:
                  type: string
                  maxLength: 500
            example:
              hospitalId: 69f3df915f42685cbbbcbb1b
              appointmentDate: 2026-05-12T10:00:00.000Z
              donationType: Whole Blood
              notes: Available in the morning.
      responses:
        "201":
          description: Appointment booked successfully
          content:
            application/json:
              example:
                success: true
                message: Appointment booked
                data:
                  _id: 69fe540565ff7785a031315c
                  donorId:
                    _id: 69f3df915f42685cbbbcbb18
                    fullName: Noor Ahmed
                    phoneNumber: '01123456789'
                    bloodType: O+
                    email: noor.ahmed@example.com
                  donorDetails:
                    fullName: Noor Ahmed
                    phoneNumber: '01123456789'
                    bloodType: O+
                    email: noor.ahmed@example.com
                  hospitalId:
                    _id: 69f3df915f42685cbbbcbb1b
                    hospitalName: Cairo Care Hospital
                    fullName: Cairo Care Operations
                  requestId: null
                  appointmentDate: 2026-05-12T10:00:00.000Z
                  status: pending
                  qrToken: 8f3a4f2f6a6d4f3a9e2c1b0a7d6c5e4f3a2b1c0d9e8f7a6b5c4d3e2f1a0b9c8d
                  qrExpiresAt: 2026-05-13T10:00:00.000Z
                  notes: First-time donor, available in the morning.
                  donationType: Whole Blood
        "400":
          description: Invalid appointment payload, validation error, or scheduling conflict
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role not allowed or donor has an active donation in progress
        "404":
          description: Hospital, donor, or request not found
        "409":
          description: Active appointment already exists for this hospital (duplicate prevention)
