openapi: 3.0.0
info:
  title: LifeLink API
  version: 1.0.0
  description: |
    OpenAPI documentation for the LifeLink blood donation platform API.
    
    ## Authentication
    All protected endpoints require a Bearer token in the Authorization header:
    ```
    Authorization: Bearer <accessToken>
    ```
    
    ## Registration
    The `/auth/signup` endpoint supports two role types:
    - **Donor**: Requires phoneNumber and dateOfBirth
    - **Hospital**: Requires hospitalName, hospitalId, and licenseNumber
    
    Choose the appropriate schema based on the role field using the oneOf discriminator.

servers:
  - url: http://localhost:5000
    description: Development server
  - url: http://localhost:8000
    description: Production server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ============= BASE SCHEMAS =============
    BaseUser:
      type: object
      required:
        - fullName
        - email
        - password
        - role
      properties:
        fullName:
          type: string
          minLength: 3
          maxLength: 100
          description: User full name
          example: Sara Ali
        email:
          type: string
          format: email
          description: User email address (must be unique)
          example: sara@example.com
        password:
          type: string
          format: password
          minLength: 8
          description: >
            Password must contain at least:
            - One uppercase letter (A-Z)
            - One lowercase letter (a-z)
            - One digit (0-9)
            - One special character (@$!%*?&)
          example: SecurePass@123
        role:
          type: string
          enum:
            - donor
            - hospital
          description: User role type
          example: donor

    # ============= DONOR SCHEMAS =============
    DonorRegister:
      allOf:
        - $ref: '#/components/schemas/BaseUser'
        - type: object
          required:
            - phoneNumber
            - dateOfBirth
          properties:
            role:
              type: string
              enum:
                - donor
              example: donor
            phoneNumber:
              type: string
              pattern: '^\d{10}$'
              description: 10-digit phone number (Egyptian format)
              example: '1234567890'
            dateOfBirth:
              type: string
              format: date
              description: Date of birth in YYYY-MM-DD format
              example: '1990-05-15'
            gender:
              type: string
              enum:
                - male
                - female
                - not specified
              description: Gender of the donor (optional)
              example: female
            bloodType:
              type: string
              enum:
                - A+
                - A-
                - B+
                - B-
                - AB+
                - AB-
                - O+
                - O-
              description: Blood type (optional)
              example: O+
            location:
              type: object
              description: Donor location (optional)
              properties:
                city:
                  type: string
                  example: Cairo
                governorate:
                  type: string
                  example: Cairo Governrate

    DonorProfile:
      allOf:
        - $ref: '#/components/schemas/BaseUser'
        - type: object
          properties:
            _id:
              type: string
              description: User ID
              example: 66f100000000000000000001
            phoneNumber:
              type: string
              example: '1234567890'
            dateOfBirth:
              type: string
              format: date
              example: '1990-05-15'
            gender:
              type: string
              example: female
            bloodType:
              type: string
              example: O+
            isAvailable:
              type: boolean
              description: Whether the donor is available for donation
              example: true
            lastDonationDate:
              type: string
              format: date-time
              description: Last donation date
              example: '2024-01-15T10:30:00Z'
            location:
              type: object
              properties:
                city:
                  type: string
                governorate:
                  type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    # ============= HOSPITAL SCHEMAS =============
    HospitalRegister:
      allOf:
        - $ref: '#/components/schemas/BaseUser'
        - type: object
          required:
            - hospitalName
            - hospitalId
            - licenseNumber
          properties:
            role:
              type: string
              enum:
                - hospital
              example: hospital
            hospitalName:
              type: string
              minLength: 3
              maxLength: 200
              description: Official hospital name
              example: Cairo Medical Center
            hospitalId:
              type: number
              description: Hospital registration ID
              example: 12345
            licenseNumber:
              type: string
              minLength: 5
              maxLength: 50
              description: Medical license number
              example: LIC-2024-001
            address:
              type: object
              description: Hospital address (optional)
              properties:
                city:
                  type: string
                  example: Cairo
                governorate:
                  type: string
                  example: Cairo Governrate
            contactNumber:
              type: string
              description: Hospital contact phone (optional)
              example: '+20123456789'

    HospitalProfile:
      allOf:
        - $ref: '#/components/schemas/BaseUser'
        - type: object
          properties:
            _id:
              type: string
              example: 66f100000000000000000002
            hospitalName:
              type: string
              example: Cairo Medical Center
            hospitalId:
              type: number
              example: 12345
            licenseNumber:
              type: string
              example: LIC-2024-001
            address:
              type: object
              properties:
                city:
                  type: string
                governorate:
                  type: string
            contactNumber:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    # ============= RESPONSE SCHEMAS =============
    User:
      type: object
      properties:
        _id:
          type: string
          example: 66f100000000000000000001
        fullName:
          type: string
          example: Sara Ali
        email:
          type: string
          example: sara@example.com
        role:
          type: string
          enum:
            - donor
            - hospital
          example: donor
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: User registered successfully
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: JWT access token (valid for 1 hour)
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2NmYxMDAwMDAwMDAwMDAwMDAwMDAwMDEiLCJyb2xlIjoiZG9ub3IiLCJpYXQiOjE3MDAwMDAwMDB9.abcdef123456
            refreshToken:
              type: string
              description: JWT refresh token (valid for 7 days)
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2NmYxMDAwMDAwMDAwMDAwMDAwMDAwMDEiLCJyb2xlIjoiZG9ub3IiLCJpYXQiOjE3MDAwMDAwMDB9.xyz789
            user:
              $ref: '#/components/schemas/User'

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          description: Error description
          example: Validation error message

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation successful
        data:
          type: object

paths:
  # ============= AUTHENTICATION ENDPOINTS =============
  /auth/signup:
    post:
      tags:
        - Authentication
      summary: Register a new user (Donor or Hospital)
      description: >
        Register a new user account. Use the appropriate schema based on role:
        - **Donor**: Requires phoneNumber and dateOfBirth in addition to base fields
        - **Hospital**: Requires hospitalName, hospitalId, licenseNumber in addition to base fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/DonorRegister'
                - $ref: '#/components/schemas/HospitalRegister'
              discriminator:
                propertyName: role
                mapping:
                  donor: '#/components/schemas/DonorRegister'
                  hospital: '#/components/schemas/HospitalRegister'
            examples:
              donorSignup:
                summary: Donor Registration Example
                description: Register as a blood donor
                value:
                  fullName: Sara Ali
                  email: sara.donor@lifelink.com
                  password: SecurePass@123
                  role: donor
                  phoneNumber: '1234567890'
                  dateOfBirth: '1990-05-15'
                  gender: female
                  bloodType: O+
                  location:
                    city: Cairo
                    governorate: Cairo
              hospitalSignup:
                summary: Hospital Registration Example
                description: Register as a hospital
                value:
                  fullName: Admin User
                  email: admin@cairo-medical.com
                  password: SecurePass@123
                  role: hospital
                  hospitalName: Cairo Medical Center
                  hospitalId: 12345
                  licenseNumber: LIC-2024-001
                  contactNumber: '+20123456789'
                  address:
                    city: Cairo
                    governorate: Cairo Governrate
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Registration failed - validation error or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  summary: Validation Error
                  value:
                    success: false
                    message: Phone number must be 10 digits; Date of birth is required
                emailExists:
                  summary: Email Already Registered
                  value:
                    success: false
                    message: Email is already registered

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login with email and password
      description: Authenticate a user and receive access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: sara@example.com
                password:
                  type: string
                  format: password
                  example: SecurePass@123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Invalid credentials

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current authenticated user
      description: Retrieve the profile of the currently authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Use a refresh token to obtain a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: Valid refresh token
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New access token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
        '400':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Invalidate the user's session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Logout error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Send a password reset email to the user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: sara@example.com
      responses:
        '200':
          description: Password reset email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Error sending reset email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: Reset password using a valid reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
              properties:
                token:
                  type: string
                  description: Password reset token from email
                  example: reset-token-abc123xyz
                password:
                  type: string
                  format: password
                  description: New password (must meet complexity requirements)
                  example: NewSecurePass@123
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-email:
    post:
      tags:
        - Authentication
      summary: Send an email verification message
      description: Request a verification email for an unverified account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: sara@example.com
      responses:
        '200':
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Verification error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-email-token:
    post:
      tags:
        - Authentication
      summary: Verify an email using a verification token
      description: Verify a user email address using a token received by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  example: verify-token-123
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Verification error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: Authentication
    description: User authentication and authorization endpoints
