      tags:
        - Admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rewardName
                - category
                - pointsRequired
              properties:
                rewardName:
                  type: string
                  description: Display name of the reward
                  example: Coffee Voucher
                rewardSubtitle:
                  type: string
                  description: Optional short description
                  example: Free coffee at partner cafes
                category:
                  type: string
                  enum: [FOOD, ENTERTAINMENT, HEALTH, STATUS]
